name: Terraform Dev

on:
  pull_request:
    paths:
      - 'infra/environments/dev/**'

jobs:
  plan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/924114433913/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'terraform-deployer-dev@lup3-485418.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v3

      - name: Run Checkov (IaC security scan)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/environments/dev
          framework: terraform


      - run: |
          cd infra/environments/dev
          terraform init -input=false
          terraform validate
          terraform plan -no-color
